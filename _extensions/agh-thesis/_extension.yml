title: AGH Thesis (PDF)
version: 0.0.0
quarto-required: ">=1.4.0"


contributes:
  formats:
    pdf:
      documentclass: mwart
      papersize: A4
      fontsize: 12pt
      openright: true

      toc: true
      toc-depth: 3
      number-sections: true
      
      cite-method: biblatex
      biblatexoptions:
        - backref=true
        - backend=biber
        - style=authoryear
        - natbib=true
      bibliography: refs.bib

      header-includes: |
        \usepackage{polski,graphicx,epigraph,xcolor,etoolbox,abstract,needspace}
        \usepackage[english,polish]{babel}
        \usepackage[version=4]{mhchem}
        \usepackage[utf8]{inputenc}
        \usepackage[a4paper, top=2cm, bottom=2cm, inner=2cm, outer=2cm, bindingoffset=1cm, twoside]{geometry}
        \renewcommand{\abstracttextfont}{\small}  

        \definecolor{aghgreen}{HTML}{00693C}
        \definecolor{aghblack}{HTML}{1E1E1E}
        \definecolor{aghred}{HTML}{A71930}
        \linespread{1.25}
        \renewcommand*{\bibfont}{\secondarysize}
        \preto\section{\clearpage}
        \newcommand{\techword}[1]{{\normalfont\textsc{#1}}}
        \let\oldtableofcontents\tableofcontents
        \renewcommand{\tableofcontents}{
          \clearpage
          \thispagestyle{empty}
          \oldtableofcontents
          \clearpage
        }

      colorlinks: true
      linkcolor: aghred
      urlcolor: aghred
      citecolor: aghgreen

      template-partials:
        - "partials/before-body.tex"

      format-resources:
        - logo_AGH.pdf
