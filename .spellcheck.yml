matrix:
- name: markdown
  hunspell:
    d: en_GB
  dictionary:
    wordlists:
      - .wordlist.txt
    encoding: utf-8
  pipeline:
    - pyspelling.filters.markdown:
        markdown_extensions:
          - markdown.extensions.fenced_code
    - pyspelling.filters.html:
        comments: false
        ignores:
          - pre
          - code
          - span.emoji
  sources:
    - '*.md' 

  default_encoding: utf-8
