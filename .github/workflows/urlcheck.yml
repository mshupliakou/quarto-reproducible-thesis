name: urlcheck

defaults:
  run:
    shell: bash

on:
  schedule:
    - cron: '0 13 * * 4'
  pull_request:
    branches: [ main ]

jobs:
  url-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - uses: urlstechie/urlchecker-action@master
        with:
          file_types: .md,.ipynb
          print_all: false
          verbose: true
          timeout: 20
          exclude_urls: http://www.w3.org/1999/xlink\,https://creativecommons.org/licenses/by/4.0/\
          retry_count: 3
